apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-devops-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-devops-app

  template:
    metadata:
      labels:
        app: flask-devops-app

    spec:
      containers:
      - name: flask-devops-container
        image: spandanaerukulla/flask-devops-app:latest

        ports:
        - containerPort: 5000